    function doRegular(originalString,replacement,regexString){
        const result = originalString.replace(str2reg(regexString), replacement);
        console.log(result);
        return result
    }

    function str2reg(regexStr) {
        // 去掉字符串的开头和结尾的斜杠
        const patternWithFlags = regexStr.slice(1);

        // 分割模式和标志
        const parts = patternWithFlags.split('/');
        const pattern = parts[0];
        const flags = parts[1] || '';

        console.log("str2reg:","\nolr:",regexStr,"\nsplit:",parts,"\npattern:",pattern,"\nflags:",flags)

        // 使用 RegExp 构造函数创建正则表达式对象
        return new RegExp(pattern, flags);
    }

        // console.log("findFirstDivsInChildDivs: childDivs", childDivs);
        childDivs.forEach(childDiv => {
            childDiv.style.background = "";
        });
    }
